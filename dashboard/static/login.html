<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VOS — TEXTING · Sign In</title>
  <link rel="icon" type="image/png" href="/static/sms.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.2/anime.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #000000;
      --agent-bg:     #2563eb;
      --contact-bg:   #1e2a40;
      --font:         'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --mono:         'JetBrains Mono', 'Courier New', monospace;
      --error-bg:     rgba(239,68,68,.10);
      --error-border: rgba(239,68,68,.30);
      --error-text:   #fca5a5;
    }

    html, body {
      height: 100%; width: 100%;
      overflow: hidden;
      font-family: var(--font);
      background: var(--bg);
      -webkit-font-smoothing: antialiased;
    }

    #bg-video {
      position: fixed;
      inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      z-index: 0;
      pointer-events: none;
      transform: scale(1.02);
    }

    #bg-overlay {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background: rgba(0,0,0,0.48);
    }

    #bg-canvas {
      position: fixed;
      inset: 0;
      width: 100%; height: 100%;
      z-index: 2;
      pointer-events: none;
    }

    .scene {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 20;
      padding: 16px;
    }

    /* ── Card ── */
    .card {
      background: rgba(10,10,10,0.58);
      backdrop-filter: blur(24px) saturate(160%);
      -webkit-backdrop-filter: blur(24px) saturate(160%);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 0 0 1px rgba(255,255,255,.08), 0 32px 96px rgba(0,0,0,.8);
      width: 100%;
      max-width: 420px;
      opacity: 0;
      transform: translateY(48px);
    }
    .card-body {
      padding: 40px 36px 44px;
    }

    /* ── Accent bar ── */

    /* ── Brand row (logo + title/subtitle side by side) ── */
    .brand-row {
      display: flex;
      align-items: center;
      gap: 13px;
      margin-bottom: 20px;
    }

    /* ── Logo mark ── */
    .logo-mark {
      width: 32px; height: 32px;
      border-radius: 0;
      object-fit: contain;
      flex-shrink: 0;
      transform: scale(0);
      opacity: 0;
      will-change: transform;
    }

    .brand-text { display: flex; flex-direction: column; gap: 3px; }

    /* ── Title ── */
    .title {
      font-size: 1.625rem;
      font-weight: 700;
      letter-spacing: -0.04em;
      line-height: 1;
      color: #fff;
      margin-bottom: 0;
      opacity: 0;
    }

    /* ── Subtitle ── */
    .subtitle {
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.42);
      margin-bottom: 0;
      opacity: 0;
    }

    /* ── Tagline ── */
    .tagline {
      font-size: 0.8125rem;
      line-height: 1.7;
      color: #ffffff;
      opacity: 0;
      min-height: 1.4em;
      margin-bottom: 0;
    }
    .cursor-blink {
      display: inline-block;
      width: 1.5px;
      height: 13px;
      background: #fff;
      margin-left: 2px;
      vertical-align: middle;
      animation: cursor-blink 1.1s step-end infinite;
    }
    @keyframes cursor-blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    /* ── Divider ── */
    .divider {
      position: relative;
      padding: 8px 0;
      margin-top: 32px;
      transform-origin: center;
      transform: scaleX(0);
      opacity: 0;
    }
    .divider-line {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
    }
    .divider-line::before {
      content: '';
      flex: 1;
      border-top: 1px solid rgba(255,255,255,.10);
    }
    .divider-label {
      position: relative;
      display: flex;
      justify-content: center;
    }
    .divider-label span {
      background: transparent;
      padding: 0 12px;
      font-size: 0.625rem;
      font-weight: 500;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      font-family: var(--mono);
    }

    /* ── Auth section ── */
    .auth-section {
      margin-top: 20px;
      opacity: 0;
    }

    /* ── Error ── */
    .error-box {
      background: var(--error-bg);
      border: 1px solid var(--error-border);
      border-radius: 6px;
      padding: 10px 14px;
      font-size: .79rem;
      font-weight: 500;
      color: var(--error-text);
      margin-bottom: 16px;
      line-height: 1.5;
      display: none;
    }

    /* ── Google button (blue) ── */
    .btn-google {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 13px 20px;
      background: #0027d9;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-family: var(--font);
      font-size: .88rem;
      font-weight: 600;
      letter-spacing: -0.01em;
      text-decoration: none;
      cursor: pointer;
      transition: background .15s, box-shadow .15s, transform .1s;
      box-shadow: 0 0 20px rgba(0,39,217,.40), 0 2px 8px rgba(0,0,0,.4);
      position: relative;
      overflow: hidden;
    }
    .btn-google::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,.10) 0%, transparent 55%);
      pointer-events: none;
    }
    .btn-google:hover {
      background: #0021b5;
      box-shadow: 0 0 28px rgba(0,39,217,.55), 0 4px 16px rgba(0,0,0,.5);
      transform: translateY(-1px);
    }
    .btn-google:active { transform: translateY(0); }
    .g-icon { width: 18px; height: 18px; flex-shrink: 0; }

    /* ── Footer ── */
    .card-footer {
      margin-top: 32px;
      padding-top: 16px;
      border-top: 1px solid rgba(255,255,255,.05);
      display: flex;
      align-items: center;
      justify-content: space-between;
      opacity: 0;
    }
    .status-dots {
      display: flex;
      gap: 5px;
      align-items: center;
    }
    .status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #3b82f6;
      box-shadow: 0 0 6px #3b82f6;
      opacity: 0.7;
      will-change: transform, opacity;
    }
    .systems-ready {
      font-family: var(--mono);
      font-size: 9px;
      font-weight: 500;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      margin-left: 12px;
    }
    .footer-link {
      font-size: 10px;
      font-weight: 500;
      color: #888;
      text-decoration: none;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      font-family: var(--mono);
      transition: color 0.2s;
    }
    .footer-link:hover { color: #fff; }
  </style>
</head>
<body>

  <video id="bg-video" muted playsinline loop></video>
  <div id="bg-overlay"></div>
  <canvas id="bg-canvas"></canvas>

  <div class="scene">
    <div class="card" id="login-card">


      <div class="card-body">

        <!-- Brand lockup -->
        <div class="brand-row" id="brand-row">
          <img src="/static/sms.png" alt="VOS" class="logo-mark" id="logo-mark" />
          <div class="brand-text">
            <h1 class="title" id="card-title">VOS</h1>
            <h2 class="subtitle" id="card-subtitle">Texting Audit</h2>
          </div>
        </div>

        <!-- Tagline -->
        <p class="tagline" id="card-tagline">
          <span id="typewriter"></span><span class="cursor-blink"></span>
        </p>

        <!-- Divider -->
        <div class="divider" id="card-divider">
          <div class="divider-line"></div>
          <div class="divider-label"><span>Authentication</span></div>
        </div>

        <!-- Auth -->
        <div class="auth-section" id="auth-section">
          <div class="error-box" id="error-box"></div>

          <a href="/auth/google" class="btn-google" id="btn-google">
            <svg class="g-icon" viewBox="0 0 24 24">
              <path fill="#fff" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
              <path fill="rgba(255,255,255,.8)" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
              <path fill="rgba(255,255,255,.6)" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
              <path fill="rgba(255,255,255,.95)" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
            </svg>
            Sign in with Google
          </a>
        </div>

        <!-- Footer -->
        <div class="card-footer" id="card-footer">
          <a href="https://t.me/Mohmed_abdo" target="_blank" rel="noopener noreferrer" class="footer-link">Mohamed Abdo</a>
        </div>

      </div>
    </div>
  </div>

  <script>
  // ─────────────────────────────────────────────────────────────────────────────
  // CANVAS — Dark theme, real estate SMS conversation bubbles + AI particles
  // Bubble styles match the dashboard exactly:
  //   Agent:   bg #2563eb  · radius 18px 4px 18px 18px  (right side)
  //   Contact: bg #1e2a40  · radius 4px 18px 18px 18px  (left side)
  // ─────────────────────────────────────────────────────────────────────────────
  const canvas = document.getElementById('bg-canvas');
  const ctx    = canvas.getContext('2d');

  function resize() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  // ── Real estate SMS conversations ─────────────────────────────────────────
  // agent = us (blue), contact = homeowner (dark)
  const AGENT_MSGS = [
    "Hey, is this the property owner?",
    "Are you considering selling anytime soon?",
    "Cash offer, no repairs needed.",
    "Your neighbors just sold for $380k.",
    "Quick question — what is your timeline to sell?",
    "Not looking to sell? What if the price was right?",
    "Hi, I am definitely not reading from a script.",
    "What is your asking price?",
    "We work with motivated sellers. Interested?",
    "Cash buyers ready to close in 14 days.",
    "You mentioned maybe selling — still the case?",
    "Is now a good time to talk?",
    "What condition is the property in currently?",
    "We can close whenever works best for you.",
    "No obligation — just a quick conversation.",
  ];

  const CONTACT_MSGS = [
    "How did you get this number?",
    "Not interested, thanks.",
    "Maybe in 6 months or so.",
    "What kind of offer are we talking?",
    "The roof needs some work.",
    "Asking $350k, best offer.",
    "I have actually been thinking about it.",
    "Who is this exactly?",
    "Please stop texting me.",
    "Fine. What is your best offer?",
    "We just renovated last year.",
    "Not now but maybe soon.",
    "My wife says no.",
    "How fast can you close?",
    "Are you a real person or a bot?",
  ];


  // ── Chat bubbles — exact dashboard style ─────────────────────────────────
  //
  //  Agent bubble  (blue, right-leaning):
  //    bg #2563eb | border-radius 18 4 18 18  | text white
  //
  //  Contact bubble (dark, left-leaning):
  //    bg #1e2a40 | border-radius 4 18 18 18  | text #f1f5f9
  //    border 1px solid rgba(148,163,184,.15)

  const N_BUBBLES = 9;
  const bubbles   = [];

  class Bubble {
    constructor(delayFrames) {
      this.delayFrames = delayFrames;
      this._init();
    }

    _init() {
      this.isAgent = Math.random() > .45;
      const pool   = this.isAgent ? AGENT_MSGS : CONTACT_MSGS;
      this.text    = pool[Math.floor(Math.random() * pool.length)];

      this.fs  = 11 + Math.random() * 2;
      ctx.font = `500 ${this.fs}px 'Inter',sans-serif`;
      const tw = ctx.measureText(this.text).width;
      this.w   = Math.min(tw + 28, canvas.width * .52);
      this.h   = this.fs + 22;

      const margin = 44;
      if (this.isAgent) {
        this.x = canvas.width * .54 + Math.random() * Math.max(0, canvas.width * .36 - this.w / 2);
      } else {
        this.x = margin + this.w / 2 + Math.random() * Math.max(0, canvas.width * .34 - this.w / 2);
      }

      // Always spawn below the visible screen
      this.y       = canvas.height + this.h + 50;
      this.vy      = -(0.6 + Math.random() * 0.5);   // 0.6–1.1 px/frame
      this.a       = 0;
      this.aMax    = 0.72 + Math.random() * 0.13;     // 0.72–0.85 — fully opaque
      this.phase   = this.delayFrames > 0 ? 'waiting' : 'in';
      this.hold    = 0;
      this.holdMax = 280 + Math.random() * 320;        // 280–600 frames
    }

    tick() {
      if (this.phase === 'waiting') {
        if (--this.delayFrames <= 0) { this.delayFrames = 0; this.phase = 'in'; }
        return;
      }
      this.y += this.vy;
      if (this.phase === 'in') {
        this.a = Math.min(this.a + 0.028, this.aMax);   // fast fade-in
        if (this.a >= this.aMax) this.phase = 'hold';
      } else if (this.phase === 'hold') {
        if (++this.hold > this.holdMax) this.phase = 'out';
      } else {
        this.a = Math.max(this.a - 0.007, 0);
      }
      if (this.y < -this.h - 30 || this.a <= 0) {
        this.delayFrames = 80 + Math.floor(Math.random() * 160);  // 1.3–4s respawn gap
        this._init();
      }
    }

    draw() {
      if (this.phase === 'waiting' || this.a <= 0) return;
      const x0 = this.x - this.w / 2;
      const y0 = this.y - this.h / 2;
      const w  = this.w, h = this.h;

      // Agent: 18 4 18 18 | Contact: 4 18 18 18
      const tl = this.isAgent ? 18 : 4;
      const tr = this.isAgent ? 4  : 18;

      ctx.beginPath();
      ctx.moveTo(x0 + tl, y0);
      ctx.lineTo(x0 + w - tr, y0);
      ctx.quadraticCurveTo(x0 + w, y0,     x0 + w, y0 + tr);
      ctx.lineTo(x0 + w, y0 + h - 18);
      ctx.quadraticCurveTo(x0 + w, y0 + h, x0 + w - 18, y0 + h);
      ctx.lineTo(x0 + 18, y0 + h);
      ctx.quadraticCurveTo(x0, y0 + h,     x0, y0 + h - 18);
      ctx.lineTo(x0, y0 + tl);
      ctx.quadraticCurveTo(x0, y0,         x0 + tl, y0);
      ctx.closePath();

      ctx.fillStyle = this.isAgent
        ? `rgba(37,99,235,${this.a})`
        : `rgba(30,42,64,${this.a})`;
      ctx.fill();

      if (!this.isAgent) {
        ctx.strokeStyle = `rgba(148,163,184,${this.a * .55})`;
        ctx.lineWidth   = 0.8;
        ctx.stroke();
      }

      // Text fully opaque once bubble is solid
      const textA = Math.min(this.a * 1.3, 0.95);
      ctx.fillStyle    = this.isAgent
        ? `rgba(255,255,255,${textA})`
        : `rgba(241,245,249,${textA})`;
      ctx.font         = `500 ${this.fs}px 'Inter',sans-serif`;
      ctx.textAlign    = 'center';
      ctx.textBaseline = 'middle';

      ctx.save();
      ctx.rect(x0 + 4, y0 + 2, w - 8, h - 4);
      ctx.clip();
      ctx.fillText(this.text, this.x, this.y);
      ctx.restore();
    }
  }

  // Stagger spawn: one bubble every ~100 frames (~1.7s at 60fps)
  for (let i = 0; i < N_BUBBLES; i++) bubbles.push(new Bubble(i * 100));

  // ── Background — transparent so video shows through ──────────────────────
  function drawBg() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
  }

  // ── Loop ─────────────────────────────────────────────────────────────────
  function loop() {
    drawBg();
    bubbles.forEach(b => { b.tick(); b.draw(); });
    requestAnimationFrame(loop);
  }
  loop();

  // ─────────────────────────────────────────────────────────────────────────
  // UI
  // ─────────────────────────────────────────────────────────────────────────
  const ERROR_MSGS = {
    unauthorized:    "Your Google account is not authorized. Contact your admin to request access.",
    oauth_failed:    "Google sign-in failed. Please try again.",
    no_email:        "Could not retrieve your email from Google. Please try again.",
    session_expired: "Your session has expired. Please sign in again.",
    state_mismatch:  "Security check failed. Please try again.",
    missing_code:    "Authorization was incomplete. Please try again.",
  };

  const params  = new URLSearchParams(window.location.search);
  const errCode = params.get("error");
  if (errCode) {
    const box = document.getElementById("error-box");
    box.textContent = ERROR_MSGS[errCode] || `Sign-in error: ${errCode}`;
    box.style.display = "block";
  }

  // ── Master entrance timeline ──────────────────────────────────────────────
  const _ease    = 'cubicBezier(0.16, 1, 0.3, 1)';
  const _springy = 'cubicBezier(0.34, 1.56, 0.64, 1)';

  const tl = anime.timeline({ defaults: { easing: _ease }, delay: 100 });
  tl
    // Card rises in
    .add({ targets: '#login-card',    translateY: [40, 0],  opacity: [0, 1], duration: 820 })
    // Logo pops with spring while card is still settling
    .add({ targets: '#logo-mark',     scale: [0, 1],        opacity: [0, 1], rotate: [-10, 0], duration: 520, easing: _springy }, '-=480')
    // Title slides in right after logo peak
    .add({ targets: '#card-title',    translateX: [-12, 0], opacity: [0, 1], duration: 420 }, '-=220')
    // Subtitle follows title closely
    .add({ targets: '#card-subtitle', translateX: [-8, 0],  opacity: [0, 1], duration: 380 }, '-=300')
    // Tagline fades up softly
    .add({ targets: '#card-tagline',  translateY: [6, 0],   opacity: [0, 1], duration: 460 }, '-=260')
    // Divider draws across after a beat
    .add({ targets: '#card-divider',  scaleX: [0, 1],       opacity: [0, 1], duration: 400 }, '+=80')
    // Button + footer stagger up
    .add({ targets: '#auth-section',  translateY: [10, 0],  opacity: [0, 1], duration: 440 }, '-=200')
    .add({ targets: '#card-footer',   translateY: [6, 0],   opacity: [0, 1], duration: 360 }, '-=280');

  // ── Typewriter ────────────────────────────────────────────────────────────────────────────────
  (function() {
    const full = 'AI That Reads Every Text, So You Never Miss a Thing';
    const el   = document.getElementById('typewriter');
    el.textContent = '';
    let i = 0;
    setTimeout(function() {
      const iv = setInterval(function() {
        el.textContent = full.slice(0, ++i);
        if (i >= full.length) clearInterval(iv);
      }, 62);
    }, 2100);
  })();



  // ── Background video ─────────────────────────────────────────────────────
  (function() {
    const video = document.getElementById('bg-video');
    video.src = 'https://d8j0ntlcm91z4.cloudfront.net/user_38xzZboKViGWJOttwIXH07lWA1P/hf_20260508_064209_0cb7d815-ff61-4caa-a6d5-bbff145ab272.mp4';
    video.play().catch(function() {});
  })();
  </script>

</body>
</html>
